<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>TFX Conversioner</title>
    <link rel="stylesheet" href="./src/ui/styles.css" />
  </head>
  <body>
    <div id="app" class="container">
      <h1>TFX Conversioner</h1>
      <p class="subtitle">TFX → Photoshop移行補助（抽出＋可視化）</p>

      <div class="section">
        <button id="selectFileBtn">TFXを選択</button>
        <button id="runBtn" disabled>解析実行</button>
      </div>

      <div id="dropZone" class="drop-zone">
        ここに .tfx をドラッグ＆ドロップ（可能な環境のみ）
      </div>

      <div class="section">
        <label><input type="checkbox" id="optPng" checked /> PNG抽出</label>
        <label><input type="checkbox" id="optText" checked /> テキストレイヤー化</label>
        <label><input type="checkbox" id="optInfo" checked /> INFO作成</label>
        <label><input type="checkbox" id="optUnknown" checked /> UNKNOWN出力</label>
      </div>

      <div class="section">
        <strong>選択中ファイル</strong>
        <div id="selectedFile">未選択</div>
      </div>

      <div class="section">
        <strong>ログ</strong>
        <pre id="logArea" class="log-area"></pre>
      </div>
    </div>

    <script src="./src/main.js"></script>
  </body>
</html>
